<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Stylized Fulham park dog walking scene</title>
  <desc id="desc">A modern editorial illustration of a calm dog walk in a green London park with a warm sky gradient and curved walking path.</desc>

  <defs>
    <linearGradient id="sky" x1="150" y1="20" x2="950" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6FAFF"/>
      <stop offset="0.45" stop-color="#DDEEF8"/>
      <stop offset="1" stop-color="#CBE4F3"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(950 130) rotate(150) scale(300 230)">
      <stop stop-color="#FFD59A" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#FFD59A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="hillBack" x1="180" y1="315" x2="1040" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A9D5C9"/>
      <stop offset="1" stop-color="#84BFAA"/>
    </linearGradient>

    <linearGradient id="hillFront" x1="180" y1="410" x2="1080" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5FA895"/>
      <stop offset="1" stop-color="#3F897A"/>
    </linearGradient>

    <linearGradient id="path" x1="350" y1="412" x2="860" y2="784" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9E4C6"/>
      <stop offset="1" stop-color="#E9CCA3"/>
    </linearGradient>

    <linearGradient id="tree" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2F7A67"/>
      <stop offset="1" stop-color="#1E5A4A"/>
    </linearGradient>

    <filter id="softShadow" x="0" y="0" width="1200" height="780" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0C3445" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="780" fill="url(#sky)"/>
  <ellipse cx="950" cy="130" rx="340" ry="230" fill="url(#sunGlow)"/>

  <path d="M0 410C132 334 229 302 354 316C512 335 636 278 756 300C904 328 1019 268 1200 314V780H0V410Z" fill="url(#hillBack)"/>
  <path d="M0 530C151 466 305 447 468 476C599 499 747 451 866 473C1012 499 1084 469 1200 500V780H0V530Z" fill="url(#hillFront)"/>

  <path d="M377 419C518 405 661 449 818 574C873 619 943 691 1014 780H224C280 682 336 595 402 524C435 487 405 453 377 419Z" fill="url(#path)" opacity="0.95"/>
  <path d="M397 432C540 430 661 466 787 567" stroke="#E2BB89" stroke-width="8" stroke-linecap="round" opacity="0.62"/>

  <g fill="url(#tree)">
    <ellipse cx="191" cy="389" rx="76" ry="66"/>
    <ellipse cx="272" cy="360" rx="66" ry="58"/>
    <rect x="221" y="385" width="26" height="78" rx="9" fill="#2F4C3D"/>

    <ellipse cx="1033" cy="335" rx="78" ry="70"/>
    <ellipse cx="950" cy="350" rx="65" ry="56"/>
    <rect x="987" y="370" width="24" height="82" rx="9" fill="#2F4C3D"/>
  </g>

  <g filter="url(#softShadow)">
    <ellipse cx="601" cy="548" rx="104" ry="29" fill="#1F4F5E" opacity="0.24"/>

    <rect x="553" y="460" width="16" height="104" rx="8" fill="#1E4D5E"/>
    <rect x="540" y="550" width="18" height="80" rx="9" fill="#1E4D5E"/>
    <rect x="565" y="550" width="18" height="80" rx="9" fill="#1E4D5E"/>

    <circle cx="561" cy="434" r="22" fill="#1E4D5E"/>
    <path d="M548 448C559 455 567 457 576 448" stroke="#D3E8F0" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

    <path d="M591 542C624 532 660 541 672 564C681 582 665 601 635 602C612 603 593 591 586 575C581 564 582 548 591 542Z" fill="#244F5B"/>
    <ellipse cx="598" cy="540" rx="14" ry="8" fill="#244F5B"/>
    <path d="M578 560L547 548" stroke="#244F5B" stroke-width="5" stroke-linecap="round"/>
    <path d="M639 602V622" stroke="#244F5B" stroke-width="10" stroke-linecap="round"/>
    <path d="M661 598V620" stroke="#244F5B" stroke-width="10" stroke-linecap="round"/>
    <circle cx="668" cy="562" r="3.5" fill="#D3E8F0"/>

    <path d="M569 490C578 499 585 516 590 544" stroke="#2D6677" stroke-width="4" stroke-linecap="round"/>
